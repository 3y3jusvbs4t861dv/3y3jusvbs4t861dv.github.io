function normalizeCfg(value){
  if(!value||typeof value!=="object")return null;

  return{
    version:2,
    updatedAt:Number(value.updatedAt||0),
    fontSize:Math.min(32,Math.max(8,Number(value.fontSize||13))),
    menuWidth:Math.min(520,Math.max(180,Math.round(Number(value.menuWidth||220)/10)*10)),
    language:SUPPORTED_LANGUAGES.includes(String(value.language||"en"))
      ?String(value.language)
      :"en",
    languageX:Math.min(100,Math.max(0,Number(value.languageX||0))),
    languageY:Math.min(100,Math.max(0,Number(value.languageY||0))),
    languageControlSize:Math.min(
      180,
      Math.max(60,Math.round(Number(value.languageControlSize||100)/5)*5)
    ),
    paintButtonX:Math.min(100,Math.max(0,Number(value.paintButtonX===undefined?100:value.paintButtonX))),
    paintButtonY:Math.min(100,Math.max(0,Number(value.paintButtonY===undefined?100:value.paintButtonY))),
    paintButtonSize:Math.min(200,Math.max(60,Math.round(Number(value.paintButtonSize||100)/5)*5)),
    paintButtonTextScale:Math.min(180,Math.max(50,Math.round(Number(value.paintButtonTextScale||100)/5)*5)),
    enabledLanguages:Array.isArray(value.enabledLanguages)
      ?[...new Set([
          ...BASE_LANGUAGES,
          ...value.enabledLanguages
            .map(String)
            .filter(code=>SUPPORTED_LANGUAGES.includes(code))
        ])]
      :[...BASE_LANGUAGES],
    links:Array.isArray(value.links)?value.links:[],
    hiddenLinks:Array.isArray(value.hiddenLinks)
      ?[...new Set(value.hiddenLinks.map(String))]
      :[],
    renames:value.renames&&typeof value.renames==="object"&&!Array.isArray(value.renames)
      ?value.renames
      :{},
    layout:value.layout&&typeof value.layout==="object"&&!Array.isArray(value.layout)
      ?value.layout
      :{},
    devCode:/^\d{4}$/.test(String(value.devCode||""))
      ?String(value.devCode)
      :DEFAULT_DEV_CODE
  };
}

function readEmbeddedCfg(){
  try{
    const node=document.getElementById("embeddedConfig");
    if(!node)return null;
    return normalizeCfg(JSON.parse(node.textContent||"null"));
  }catch(_){
    return null;
  }
}

function loadCfg(){
  let stored=null;

  try{
    stored=normalizeCfg(JSON.parse(localStorage.getItem(CFG_KEY)||"null"));
  }catch(_){}

  const embedded=readEmbeddedCfg();
  const available=[stored,embedded].filter(Boolean);

  if(available.length){
    return available.sort(
      (a,b)=>Number(b.updatedAt||0)-Number(a.updatedAt||0)
    )[0];
  }

  let legacyFont=13;
  let legacyRenames={};

  try{
    legacyFont=Math.min(
      32,
      Math.max(8,Number(localStorage.getItem(LEGACY_FONT_SIZE_KEY)||13))
    );
  }catch(_){}

  try{
    const oldRenames=JSON.parse(localStorage.getItem(LEGACY_RENAME_KEY)||"{}");
    if(oldRenames&&typeof oldRenames==="object"&&!Array.isArray(oldRenames)){
      legacyRenames=oldRenames;
    }
  }catch(_){}

  return{
    version:2,
    updatedAt:Date.now(),
    fontSize:legacyFont,
    menuWidth:220,
    language:"en",
    languageX:0,
    languageY:0,
    languageControlSize:100,
    paintButtonX:100,
    paintButtonY:100,
    paintButtonSize:100,
    enabledLanguages:[...BASE_LANGUAGES],
    links:[],
    hiddenLinks:[],
    renames:legacyRenames,
    layout:{},
    devCode:DEFAULT_DEV_CODE
  };
}

function renameMap(){
  return{...remoteRenames,...localRenames};
}

function currentCfg(){
  return{
    version:2,
    updatedAt:Date.now(),
    fontSize:Math.min(32,Math.max(8,Number(cfg.fontSize||13))),
    menuWidth:menuWidth,
    language:language,
    languageX:languageX,
    languageY:languageY,
    languageControlSize:languageControlSize,
    paintButtonX:paintButtonX,
    paintButtonY:paintButtonY,
    paintButtonSize:paintButtonSize,
    enabledLanguages:[...enabledLanguages],
    links:Array.isArray(customLinks)?customLinks:[],
    hiddenLinks:[...new Set(hiddenLinks)],
    renames:renameMap(),
    layout:layout,
    devCode:devCode
  };
}

function saveCfg(message="",show=true){
  cfg=currentCfg();
  localStorage.setItem(CFG_KEY,JSON.stringify(cfg));

  if(show&&message){
    showToast(message);
  }
}

function showToast(message){
  clearTimeout(toastTimer);
  toast.textContent=message;
  toast.classList.remove("show");
  void toast.offsetWidth;
  toast.classList.add("show");

  toastTimer=setTimeout(()=>{
    toast.classList.remove("show");
  },1800);
}

function downloadText(filename,text,mime){
  const blob=new Blob([text],{type:mime});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=filename;
  link.click();

  setTimeout(()=>{
    URL.revokeObjectURL(link.href);
  },1000);
}

  );
  showToast("EXPORTED");
}

function applyPaintButtonLayout(xValue=paintButtonX,yValue=paintButtonY,sizeValue=paintButtonSize,save=true){
  paintButtonX=Math.min(100,Math.max(0,Number(xValue||0)));
  paintButtonY=Math.min(100,Math.max(0,Number(yValue||0)));
  paintButtonSize=Math.min(200,Math.max(60,Math.round(Number(sizeValue||100)/5)*5));
  const scale=paintButtonSize/100;
  const width=Math.max(52,Math.round(110*scale));
  const height=Math.max(24,Math.round(48*scale));
  const requestedFont=Math.max(
    7,
    Number(cfg.fontSize||13)
  );
  const maximumFittedFont=Math.max(
    8,
    Math.min(
      48,
      height*.84,
      width/3.9
    )
  );
  const normalizedTextScale=(paintButtonTextScale-50)/(180-50);
  const fittedFont=Math.max(
    7,
    maximumFittedFont*(.24+(.76*Math.min(1,Math.max(0,normalizedTextScale))))
  );
  const availableX=Math.max(0,window.innerWidth-width);
  const availableY=Math.max(0,window.innerHeight-height);
  const left=Math.round(availableX*(paintButtonX/100));
  const top=Math.round(availableY*(paintButtonY/100));
  const root=document.documentElement;
  root.style.setProperty("--paint-button-width",width+"px");
  root.style.setProperty("--paint-button-height",height+"px");
  root.style.setProperty(
    "--paint-button-font-size",
    fittedFont+"px"
  );
  root.style.setProperty("--paint-button-left",left+"px");
  root.style.setProperty("--paint-button-top",top+"px");
  paintButtonSizeSlider.value=String(paintButtonSize);
  paintTextSizeDevSlider.value=String(paintButtonTextScale);
  cfg.paintButtonX=paintButtonX; cfg.paintButtonY=paintButtonY; cfg.paintButtonSize=paintButtonSize;
  if(save)saveCfg("",false);
}

function startPaintLauncherDrag(event){
  if(!devUnlocked||!dragEnabled)return;
  if(event.button!==undefined&&event.button!==0)return;

  const target=
    event.target instanceof Element
      ?event.target.closest("#paintLauncher")
      :null;

  if(target!==paintLauncher)return;

  event.preventDefault();
  event.stopPropagation();

  const rect=paintLauncher.getBoundingClientRect();

  paintLauncherDragState={
    pointerId:event.pointerId,
    startX:event.clientX,
    startY:event.clientY,
    offsetX:event.clientX-rect.left,
    offsetY:event.clientY-rect.top,
    moved:false
  };

  try{
    paintLauncher.setPointerCapture(
      event.pointerId
    );
  }catch(_){}

  paintLauncher.classList.add("dragging");
}

function movePaintLauncherDrag(event){
  if(!paintLauncherDragState)return;
  if(event.pointerId!==paintLauncherDragState.pointerId)return;

  const distance=Math.hypot(
    event.clientX-paintLauncherDragState.startX,
    event.clientY-paintLauncherDragState.startY
  );

  if(
    !paintLauncherDragState.moved&&
    distance<5
  ){
    return;
  }

  paintLauncherDragState.moved=true;
  event.preventDefault();

  const availableX=Math.max(
    0,
    window.innerWidth-paintLauncher.offsetWidth
  );
  const availableY=Math.max(
    0,
    window.innerHeight-paintLauncher.offsetHeight
  );

  const left=Math.min(
    availableX,
    Math.max(
      0,
      snapValue(
        event.clientX-paintLauncherDragState.offsetX
      )
    )
  );
  const top=Math.min(
    availableY,
    Math.max(
      0,
      snapValue(
        event.clientY-paintLauncherDragState.offsetY
      )
    )
  );

  paintButtonX=availableX>0
    ?(left/availableX)*100
    :0;
  paintButtonY=availableY>0
    ?(top/availableY)*100
    :0;

  document.documentElement.style.setProperty(
    "--paint-button-left",
    left+"px"
  );
  document.documentElement.style.setProperty(
    "--paint-button-top",
    top+"px"
  );

function finishPaintLauncherDrag(event){

  if(
    event&&
    event.pointerId!==undefined&&
    event.pointerId!==paintLauncherDragState.pointerId
  ){
    return;
  }

  const moved=paintLauncherDragState.moved;

  try{
    if(
      event&&
      event.pointerId!==undefined&&
      paintLauncher.hasPointerCapture(
        event.pointerId
      )
    ){
      paintLauncher.releasePointerCapture(
        event.pointerId
      );
    }
  }catch(_){}

  paintLauncherDragState=null;
  paintLauncher.classList.remove("dragging");

  if(moved){
    suppressPaintLaunchClick=true;
    cfg.paintButtonX=paintButtonX;
    cfg.paintButtonY=paintButtonY;

function isPaintStackedLayout(){
  return window.matchMedia(
    "(max-width:820px) and (orientation:portrait)"
  ).matches;
}

function isPaintMobileLandscape(){
  return window.matchMedia(
    "(max-width:820px) and (orientation:landscape)"
  ).matches;
}

function snapPaintSplit(value){
  return Math.round(
    Number(value||0)/PAINT_SPLIT_SNAP
  )*PAINT_SPLIT_SNAP;
}

function paintSplitAxisSize(){
  const rect=paintWorkspace.getBoundingClientRect();
  return isPaintStackedLayout()
    ?rect.height
    :rect.width;
}

function savePaintSplit(ratio){
  try{
    localStorage.setItem(
      PAINT_SPLIT_KEY,
      String(ratio)
    );
  }catch(_){}
}

function loadPaintSplit(){
  let ratio=.42;

  try{
    const saved=Number(
      localStorage.getItem(PAINT_SPLIT_KEY)
    );

    if(Number.isFinite(saved)){
      ratio=saved;
    }
  }catch(_){}

  applyPaintSplit(ratio,false);
}

function applyPaintSplit(ratio,save=true){
  const axis=Math.max(1,paintSplitAxisSize());
  const divider=window.matchMedia("(min-width:821px)").matches?9:11;
  const mobilePanelMinimum=Math.max(120,Number(paintWorkspace.dataset.paintPanelMinimum||120));
  const minimum=isPaintStackedLayout()?mobilePanelMinimum:150;
  const remainingMinimum=isPaintStackedLayout()?90:180;
  const maximum=Math.max(
    minimum,
    axis-divider-remainingMinimum
  );

  ratio=Math.min(isPaintStackedLayout()?.88:.78,Math.max(.18,Number(ratio||.42)));

  const pixels=Math.min(
    maximum,
    Math.max(
      minimum,
      snapPaintSplit(axis*ratio)
    )
  );

  paintWorkspace.style.setProperty(
    "--paint-tools-px",
    pixels+"px"
  );
  paintBox.style.setProperty(
    "--paint-tools-px",
    pixels+"px"
  );

  if(save){
    savePaintSplit(pixels/axis);
  }

  requestAnimationFrame(()=>{
    fitPaintToolbar();
    resizeFabricCanvas();
    window.dispatchEvent(new Event("paintsplitresize"));
  });
}

let paintToolbarFitFrame=0;
function paintControlContentFits(control){
  const rect=control.getBoundingClientRect();
  if(rect.width<2||rect.height<2)return false;
  const css=getComputedStyle(control);
  const left=rect.left+(parseFloat(css.paddingLeft)||0)-.5;
  const right=rect.right-(parseFloat(css.paddingRight)||0)+.5;
  const top=rect.top+(parseFloat(css.paddingTop)||0)-.5;
  const bottom=rect.bottom-(parseFloat(css.paddingBottom)||0)+.5;
  for(const child of control.children){
    if(child.hidden||getComputedStyle(child).display==="none")continue;
    const childRect=child.getBoundingClientRect();
    if(childRect.left<left||childRect.right>right||childRect.top<top||childRect.bottom>bottom)return false;
  }
  for(const descendant of control.querySelectorAll("*")){
    const style=getComputedStyle(descendant);
    if(descendant.hidden||style.display==="none")continue;
    if(["hidden","clip","auto","scroll"].includes(style.overflowX)&&descendant.scrollWidth>descendant.clientWidth+1)return false;
    if(["hidden","clip","auto","scroll"].includes(style.overflowY)&&descendant.scrollHeight>descendant.clientHeight+1)return false;
  }
  return control.scrollWidth<=control.clientWidth+1&&control.scrollHeight<=control.clientHeight+1;
}
function fitPaintControlText(control){
  const rect=control.getBoundingClientRect();
  if(rect.width<4||rect.height<4)return;
  const primaryControl=control.classList.contains("paint-color-square-control")||control.classList.contains("paint-brush-square-control");
  const label=primaryControl?control.querySelector(".paint-tool-field-label"):null;
  const labelText=label&&label.querySelector("span");
  if(primaryControl&&label&&labelText){
    control.style.setProperty("--paint-control-font-size","4px");
    label.style.removeProperty("font-size");
    const labelRect=label.getBoundingClientRect();
    let low=4;
    let high=Math.max(low,Math.min(140,Math.floor(labelRect.height*.94),Math.floor(labelRect.width*.62)));
    let best=low;
    for(let pass=0;pass<10&&low<=high;pass++){
      const size=Math.floor((low+high)/2);
      label.style.fontSize=size+"px";
      const fits=labelText.scrollWidth<=label.clientWidth+1&&labelText.scrollHeight<=label.clientHeight+1;
      if(fits){best=size;low=size+1;}else high=size-1;
    }
    label.style.fontSize=best+"px";
    return;
  }
  let low=4;
  let high=Math.max(low,Math.min(72,Math.floor(rect.height*.82),Math.floor(rect.width*.72)));
  let best=low;
  for(let pass=0;pass<9&&low<=high;pass++){
    const size=Math.floor((low+high)/2);
    control.style.setProperty("--paint-control-font-size",size+"px");
    if(paintControlContentFits(control)){best=size;low=size+1;}else high=size-1;
  }
  control.style.setProperty("--paint-control-font-size",best+"px");
}
function fitPaintToolbar(){
  cancelAnimationFrame(paintToolbarFitFrame);
  paintToolbarFitFrame=requestAnimationFrame(()=>{
    paintToolbarFitFrame=0;
    if(!paintToolbarGroups||!paintToolbar)return;
    const controls=paintToolControls();
    const count=controls.length;
    const width=paintToolbar.clientWidth;
    const height=paintToolbar.clientHeight;
    if(!count||width<20||height<20)return;
    const gap=4;
    const regularCount=Math.max(0,count-1);
    const longestWord=Math.max(1,...controls.flatMap(control=>
      [...control.querySelectorAll(".paint-tool-word,.paint-tool-field-label span")]
        .map(node=>String(node.textContent||"").trim().length)
    ));
    let bestColumns=1;
    let bestScore=-Infinity;
    const maximumColumns=Math.min(Math.max(1,regularCount),8);
    for(let columns=1;columns<=maximumColumns;columns++){
      const regularRows=Math.max(1,Math.ceil(regularCount/columns));
      const rows=regularRows+1;
      const cellWidth=(width-gap*(columns-1))/columns;
      const cellHeight=(height-gap*(rows-1))/rows;
      if(cellWidth<24||cellHeight<20)continue;
      const estimatedFont=Math.min(cellHeight*.74,cellWidth/(Math.max(4,longestWord)*.56));
      const balancePenalty=Math.abs((cellWidth/cellHeight)-1.55)*.05;
      const score=estimatedFont-balancePenalty;
      if(score>bestScore){
        bestScore=score;
        bestColumns=columns;
      }
    }
    syncPaintLandscapeFourColumnOrder(bestColumns);
    const fittedControls=paintToolControls();
    const regularRows=Math.max(1,Math.ceil(Math.max(0,fittedControls.length-1)/bestColumns));
    const rows=regularRows+1;
    paintToolbarGroups.style.gridTemplateColumns=`repeat(${bestColumns},minmax(0,1fr))`;
    paintToolbarGroups.style.gridTemplateRows=`repeat(${rows},minmax(0,1fr))`;
    fittedControls.forEach(control=>{
      control.style.removeProperty("--paint-control-font-size");
      control.style.removeProperty("grid-column");
      const label=control.querySelector(".paint-tool-field-label");
      if(label)label.style.removeProperty("font-size");
    });
    if(fittedControls.length)fittedControls[0].style.gridColumn="1/-1";
    fittedControls.forEach(fitPaintControlText);
  });
}
function startPaintSplitDrag(event){
  /* Touch/pen pointer events may report a non-mouse button value. */
  if(event.pointerType==="mouse"&&event.button!==0)return;

  event.preventDefault();
  event.stopPropagation();

  paintSplitDragState={
    pointerId:event.pointerId,
    workspaceRect:paintWorkspace.getBoundingClientRect()
  };

  paintSplitDivider.setPointerCapture(event.pointerId);
  paintSplitDivider.classList.add("dragging");
}

function movePaintSplitDrag(event){
  if(!paintSplitDragState)return;
  if(event.pointerId!==paintSplitDragState.pointerId)return;

  event.preventDefault();

  const rect=paintSplitDragState.workspaceRect;
  const axis=isPaintStackedLayout()
    ?rect.height
    :rect.width;
  const position=isPaintStackedLayout()
    ?event.clientY-rect.top
    :isPaintMobileLandscape()
      ?rect.right-event.clientX
      :event.clientX-rect.left;

  applyPaintSplit(
    snapPaintSplit(position)/Math.max(1,axis),
    false
  );
}

function finishPaintSplitDrag(event){
  if(!paintSplitDragState)return;

  if(
    event&&
    event.pointerId!==undefined&&
    event.pointerId!==paintSplitDragState.pointerId
  ){
    return;
  }

  const axis=Math.max(1,paintSplitAxisSize());
  const raw=getComputedStyle(
    paintWorkspace
  ).getPropertyValue(
    "--paint-tools-px"
  ).trim();
  const pixels=parseFloat(raw)||axis*.42;

  paintSplitDragState=null;
  paintSplitDivider.classList.remove("dragging");
  savePaintSplit(pixels/axis);
  fitPaintToolbar();
  resizeFabricCanvas();
}
function ensureFabricCanvas(){

    !window.fabric||
    typeof window.fabric.Canvas!=="function"
  ){
    showToast("PAINT LIBRARY NOT LOADED");
    return false;
  }

  const initialWidth=Math.max(
    180,
    Math.floor(paintCanvasStage.clientWidth||1200)
  );
  const initialHeight=Math.max(
    140,
    Math.floor(paintCanvasStage.clientHeight||800)
  );

  fabricCanvas=new fabric.Canvas(
    "paintCanvas",
    {
      width:initialWidth,
      height:initialHeight,
      backgroundColor:"#ffffff",
      preserveObjectStacking:true,
      selection:true,
      centeredScaling:false,
      controlsAboveOverlay:true
    }
  );

  fabric.Object.prototype.transparentCorners=false;
  fabric.Object.prototype.cornerStyle="rect";
  fabric.Object.prototype.cornerColor="#5b8def";
  fabric.Object.prototype.cornerStrokeColor="#660099";
  fabric.Object.prototype.borderColor="#660099";
  fabric.Object.prototype.cornerSize=16;
  fabric.Object.prototype.padding=0;

  fabricCanvas.on(
    "object:added",

  );
  const constrainPaintInteraction=event=>{
    if(!event||!event.target)return;

    fabricCanvas.requestRenderAll();
  };

  fabricCanvas.on(
    "object:moving",
    constrainPaintInteraction
  );
  fabricCanvas.on(
    "object:scaling",
    constrainPaintInteraction
  );
  fabricCanvas.on(
    "object:rotating",
    constrainPaintInteraction

    "object:modified",

      constrainPaintInteraction(event);
      queuePaintHistory();
    }
  );
  fabricCanvas.on(
    "object:removed",
    queuePaintHistory
  );
  fabricCanvas.on(
    "path:created",
    queuePaintHistory
  );
  fabricCanvas.on(
    "mouse:down",
    fillEnclosedPaintRegion
  );
  fabricCanvas.on(
    "selection:created",
    syncPaintControlsFromSelection
  );
  fabricCanvas.on(
    "selection:updated",
    syncPaintControlsFromSelection
  );

  paintTextSizeInput.value=String(
    Math.min(
      240,
      Math.max(8,Number(cfg.fontSize||13))
    )
  );

  setPaintMode("draw");
  resizeFabricCanvas();

function resizeFabricCanvas(){
  if(!fabricCanvas)return;

  const width=Math.max(
    1,
    Math.floor(paintCanvasStage.clientWidth-2)
  );
  const height=Math.max(
    1,
    Math.floor(paintCanvasStage.clientHeight-2)
  );
  const oldWidth=Math.max(
    1,
    fabricCanvas.getWidth()
  );
  const oldHeight=Math.max(
    1,
    fabricCanvas.getHeight()
  );

  if(
    oldWidth!==width||
    oldHeight!==height
  ){
    const objects=fabricCanvas.getObjects();

    objects.forEach(object=>{
      object.set({
        left:(object.left||0)*(width/oldWidth),
        top:(object.top||0)*(height/oldHeight)
      });
      object.setCoords();
    });

    fabricCanvas.setDimensions({
      width,
      height
    });

    objects.forEach(object=>{
      clampPaintObject(object);
    });
  }else{
    fabricCanvas.setDimensions(
      {width,height},
      {cssOnly:true}
    );
  }

  const wrapper=fabricCanvas.wrapperEl;

  if(wrapper){
    wrapper.style.position="absolute";
    wrapper.style.inset="1px";
    wrapper.style.width="calc(100% - 2px)";
    wrapper.style.height="calc(100% - 2px)";
    wrapper.style.maxWidth="calc(100% - 2px)";
    wrapper.style.maxHeight="calc(100% - 2px)";
    wrapper.style.boxSizing="border-box";
    wrapper.style.overflow="hidden";
  }

  fabricCanvas.calcOffset();
  fabricCanvas.requestRenderAll();
}
const PAINT_TOOL_ORDER_KEY="TEXT_SITEMAP_PAINT_TOOL_ORDER_V2";
const PAINT_TOOL_ORDER_LEGACY_KEY="TEXT_SITEMAP_PAINT_TOOL_ORDER_V1";
const PAINT_LANDSCAPE_FOUR_COLUMN_ORDER=[
  "paintTextButton",
  "paintDrawButton","paintSelectButton","paintCopyButton","paintPasteButton",
  "paintEraserButton","paintDeleteButton","paintClearButton","paintUndoButton",
  "paintSizeInput","paintLineButton","paintAddTextButton","paintRedoButton",
  "paintColorInput","paintFillButton","paintAddImageButton","paintClipboardButton"
];
let paintToolDragState=null;
let suppressPaintToolClick=false;
let paintSpecialLandscapeFourOrderApplied=false;
let paintStoredNonSpecialToolOrder=null;

function paintToolControlKey(control){
  if(!control)return"";
  if(control.id)return control.id;
  const nested=control.querySelector("input[id],select[id],button[id]");
  return nested?nested.id:"";
}
function paintToolControls(){
  return [...paintToolbarGroups.children].filter(control=>
    control instanceof Element&&
    !control.hidden&&
    control.id!=="paintTextSizeInput"
  );
}
function savePaintToolOrder(){
  const order=paintToolControls().map(paintToolControlKey).filter(Boolean);
  try{localStorage.setItem(PAINT_TOOL_ORDER_KEY,JSON.stringify(order));}catch(_){}
}
function loadPaintToolOrder(){
  let order=null;
  try{order=JSON.parse(localStorage.getItem(PAINT_TOOL_ORDER_KEY)||"null");}catch(_){order=null;}
  if(!Array.isArray(order)){
    let legacy=null;
    try{legacy=JSON.parse(localStorage.getItem(PAINT_TOOL_ORDER_LEGACY_KEY)||"null");}catch(_){legacy=null;}
    if(legacy&&typeof legacy==="object"){
      const sequence=["DRAW-CREATE","EDIT","TRANSFORM","LAYERS","ALIGN","TEXT","OUTPUT"];
      order=sequence.flatMap(key=>Array.isArray(legacy[key])?legacy[key]:[]);
    }
  }
  if(!Array.isArray(order))return;
  const controls=new Map(paintToolControls().map(control=>[paintToolControlKey(control),control]));
  const used=new Set();
  order.forEach(key=>{
    const control=controls.get(key);
    if(!control||used.has(key))return;
    paintToolbarGroups.append(control);
    used.add(key);
  });
  controls.forEach((control,key)=>{if(!used.has(key))paintToolbarGroups.append(control);});
}
function paintCurrentToolOrder(){
  return paintToolControls().map(paintToolControlKey).filter(Boolean);
}
function applyPaintToolOrder(order){
  const controls=new Map(paintToolControls().map(control=>[paintToolControlKey(control),control]));
  const used=new Set();
  order.forEach(key=>{
    const control=controls.get(key);
    if(!control||used.has(key))return;
    paintToolbarGroups.append(control);
    used.add(key);
  });
  controls.forEach((control,key)=>{
    if(!used.has(key))paintToolbarGroups.append(control);
  });
}
function paintUseLandscapeFourColumnOrder(bestColumns){
  return isPaintMobileLandscape()&&bestColumns===4;
}
function syncPaintLandscapeFourColumnOrder(bestColumns){
  const current=paintCurrentToolOrder();
  if(!current.length)return;
  if(paintUseLandscapeFourColumnOrder(bestColumns)){
    const desired=PAINT_LANDSCAPE_FOUR_COLUMN_ORDER.filter(key=>current.includes(key)).concat(
      current.filter(key=>!PAINT_LANDSCAPE_FOUR_COLUMN_ORDER.includes(key))
    );
    if(!paintSpecialLandscapeFourOrderApplied){
      paintStoredNonSpecialToolOrder=current.slice();
    }
    if(JSON.stringify(current)!==JSON.stringify(desired))applyPaintToolOrder(desired);
    paintSpecialLandscapeFourOrderApplied=true;
    return;
  }
  if(paintSpecialLandscapeFourOrderApplied){
    const restore=(Array.isArray(paintStoredNonSpecialToolOrder)&&paintStoredNonSpecialToolOrder.length
      ?paintStoredNonSpecialToolOrder
      :current
    ).filter((key,index,array)=>array.indexOf(key)===index);
    const desired=restore.filter(key=>current.includes(key)).concat(
      current.filter(key=>!restore.includes(key))
    );
    if(JSON.stringify(current)!==JSON.stringify(desired))applyPaintToolOrder(desired);
    paintSpecialLandscapeFourOrderApplied=false;
    paintStoredNonSpecialToolOrder=null;
  }
}
function syncPaintToolFullLengthSlot(){
  const controls=paintToolControls();
  controls.forEach(control=>control.style.removeProperty("grid-column"));
  if(controls.length)controls[0].style.gridColumn="1/-1";
}
function beginPaintToolDragging(state){
  if(!state||state.dragging)return;
  state.dragging=true;
  suppressPaintToolClick=true;
  const rect=state.control.getBoundingClientRect();
  state.offsetX=state.startX-rect.left;
  state.offsetY=state.startY-rect.top;
  state.ghost=state.control.cloneNode(true);
  state.ghost.removeAttribute("id");
  state.ghost.querySelectorAll("[id]").forEach(node=>node.removeAttribute("id"));
  state.ghost.classList.remove("active","paint-inverse-flash","paint-green-flash","paint-tool-drag-source");
  state.ghost.classList.add("paint-tool-drag-ghost");
  state.ghost.querySelectorAll("input,select,button").forEach(node=>node.disabled=true);
  Object.assign(state.ghost.style,{
    left:rect.left+"px",top:rect.top+"px",width:rect.width+"px",height:rect.height+"px"
  });
  document.body.append(state.ghost);
  state.control.classList.add("paint-tool-drag-source");
  syncPaintToolFullLengthSlot();
  document.body.classList.add("paint-tool-drag-active");
}
function startPaintToolDrag(event){
  if(event.pointerType==="mouse"&&event.button!==0)return;
  if(event.target instanceof Element&&event.target.closest("input,textarea,select"))return;
  const control=event.target instanceof Element
    ?event.target.closest(".paint-tool-button,.paint-tool-field,.paint-tool-select")
    :null;
  if(!control||control.parentElement!==paintToolbarGroups)return;
  const touch=event.pointerType!=="mouse";
  paintToolDragState={
    control,pointerId:event.pointerId,startX:event.clientX,startY:event.clientY,
    dragging:false,touch,longPressTimer:0,offsetX:0,offsetY:0,ghost:null,lastTarget:null
  };
  if(touch){
    paintToolDragState.longPressTimer=setTimeout(()=>{
      if(paintToolDragState&&paintToolDragState.control===control)beginPaintToolDragging(paintToolDragState);
    },250);
  }else{
    try{control.setPointerCapture(event.pointerId);}catch(_){}
  }
}
function swapPaintToolControls(first,second){
  if(!first||!second||first===second||first.parentElement!==paintToolbarGroups||second.parentElement!==paintToolbarGroups)return;
  const marker=document.createComment("paint-tool-swap");
  paintToolbarGroups.insertBefore(marker,first);
  paintToolbarGroups.insertBefore(first,second);
  paintToolbarGroups.insertBefore(second,marker);
  marker.remove();
}
function paintToolSwapTarget(clientX,clientY,dragged){
  const element=document.elementFromPoint(clientX,clientY);
  const target=element instanceof Element
    ?element.closest(".paint-tool-button,.paint-tool-field,.paint-tool-select")
    :null;
  return target&&target!==dragged&&target.parentElement===paintToolbarGroups?target:null;
}
function movePaintToolDrag(event){
  const state=paintToolDragState;
  if(!state||event.pointerId!==state.pointerId)return;
  const distance=Math.hypot(event.clientX-state.startX,event.clientY-state.startY);
  if(!state.dragging){
    if(state.touch){
      if(distance>14){
        clearTimeout(state.longPressTimer);
        paintToolDragState=null;
      }
      return;
    }
    if(distance<3)return;
    beginPaintToolDragging(state);
  }
  event.preventDefault();
  if(state.ghost){
    state.ghost.style.transform=`translate3d(${event.clientX-state.offsetX-parseFloat(state.ghost.style.left)}px,${event.clientY-state.offsetY-parseFloat(state.ghost.style.top)}px,0)`;
  }
  const target=paintToolSwapTarget(event.clientX,event.clientY,state.control);
  if(!target||target===state.lastTarget)return;
  state.lastTarget=target;
  swapPaintToolControls(state.control,target);
  syncPaintToolFullLengthSlot();
}
function finishPaintToolDrag(event){
  const state=paintToolDragState;
  if(!state)return;
  if(event&&event.pointerId!==undefined&&event.pointerId!==state.pointerId)return;
  if(state.longPressTimer)clearTimeout(state.longPressTimer);
  const dragged=state.dragging;
  state.control.classList.remove("paint-tool-drag-source");
  if(state.ghost)state.ghost.remove();
  try{if(event&&state.control.hasPointerCapture(event.pointerId))state.control.releasePointerCapture(event.pointerId);}catch(_){}
  document.body.classList.remove("paint-tool-drag-active");
  paintToolDragState=null;
  if(dragged){
    savePaintToolOrder();
    fitPaintToolbar();
    showToast("TOOL ORDER SAVED");
  }
  setTimeout(()=>{suppressPaintToolClick=false;},180);
}

      fabricCanvas.discardActiveObject();
      fabricCanvas.requestRenderAll();
      savePaintHistory();
    });

    return;
  }

  const fillColor=paintHexToRgba(paintColorInput.value);
  const maskCanvas=document.createElement("canvas");

    maskData[offset+3]=255;

function applyLanguageControlLayout(
  xValue=languageX,
  yValue=languageY,
  sizeValue=languageControlSize,
  save=true
){
  languageX=Math.min(100,Math.max(0,Number(xValue||0)));
  languageY=Math.min(100,Math.max(0,Number(yValue||0)));
  languageControlSize=Math.min(
    180,
    Math.max(60,Math.round(Number(sizeValue||100)/5)*5)
  );

  const requestedScale=languageControlSize/100;
  const viewportWidth=Math.max(1,window.innerWidth);
  const viewportHeight=Math.max(1,window.innerHeight);
  const fitScale=Math.max(.35,(viewportWidth-4)/312);
  const scale=Math.min(requestedScale,fitScale);

  const selectWidth=Math.max(108,Math.round(180*scale));
  const buttonWidth=Math.max(80,Math.round(132*scale));
  const height=Math.max(24,Math.round(36*scale));
  const fontSize=Math.max(8,Math.round(12*scale));
  const horizontalPadding=Math.max(4,Math.round(8*scale));
  const buttonPadding=Math.max(5,Math.round(10*scale));
  const dividerWidth=Math.max(2,Math.round(3*scale));
  const panelWidth=selectWidth+buttonWidth;
  const availableX=Math.max(0,viewportWidth-panelWidth);
  const availableY=Math.max(0,viewportHeight-height);
  const left=Math.round(availableX*(languageX/100));
  const top=Math.round(availableY*(languageY/100));

  languageSizeSlider.value=String(languageControlSize);

  document.documentElement.style.setProperty(
    "--language-select-width",
    selectWidth+"px"
  );
  document.documentElement.style.setProperty(
    "--language-button-width",
    buttonWidth+"px"
  );
  document.documentElement.style.setProperty(
    "--language-height",
    height+"px"
  );
  document.documentElement.style.setProperty(
    "--language-font-size",
    fontSize+"px"
  );
  document.documentElement.style.setProperty(
    "--language-horizontal-padding",
    horizontalPadding+"px"
  );
  document.documentElement.style.setProperty(
    "--language-button-padding",
    buttonPadding+"px"
  );
  document.documentElement.style.setProperty(
    "--language-divider-width",
    dividerWidth+"px"
  );
  document.documentElement.style.setProperty(
    "--language-left",
    left+"px"
  );
  document.documentElement.style.setProperty(
    "--language-top",
    top+"px"
  );

  cfg.languageX=languageX;
  cfg.languageY=languageY;
  cfg.languageControlSize=languageControlSize;

  if(save){
    saveCfg("",false);
  }
}

function startLanguagePanelDrag(event){
  if(!devUnlocked||!dragEnabled)return;
  if(event.button!==undefined&&event.button!==0)return;

  event.preventDefault();
  event.stopPropagation();

  const rect=languagePanel.getBoundingClientRect();

  languageDragState={
    pointerId:event.pointerId,
    startX:event.clientX,
    startY:event.clientY,
    offsetX:event.clientX-rect.left,
    offsetY:event.clientY-rect.top,
    moved:false
  };

  languagePanel.setPointerCapture(event.pointerId);
  languagePanel.classList.add("dragging");
}

function moveLanguagePanelDrag(event){
  if(!languageDragState)return;
  if(event.pointerId!==languageDragState.pointerId)return;

  const distance=Math.hypot(
    event.clientX-languageDragState.startX,
    event.clientY-languageDragState.startY
  );

  if(!languageDragState.moved&&distance<5){
    return;
  }

  languageDragState.moved=true;
  event.preventDefault();

  const panelWidth=languagePanel.offsetWidth;
  const panelHeight=languagePanel.offsetHeight;
  const availableX=Math.max(0,window.innerWidth-panelWidth);
  const availableY=Math.max(0,window.innerHeight-panelHeight);

  const left=Math.min(
    availableX,
    Math.max(
      0,
      snapValue(event.clientX-languageDragState.offsetX)
    )
  );

  const top=Math.min(
    availableY,
    Math.max(
      0,
      snapValue(event.clientY-languageDragState.offsetY)
    )
  );

  languageX=availableX>0?(left/availableX)*100:0;
  languageY=availableY>0?(top/availableY)*100:0;

  document.documentElement.style.setProperty(
    "--language-left",
    left+"px"
  );
  document.documentElement.style.setProperty(
    "--language-top",
    top+"px"
  );

  cfg.languageX=languageX;
  cfg.languageY=languageY;
}

function finishLanguagePanelDrag(event){
  if(!languageDragState)return;
  if(
    event&&
    event.pointerId!==undefined&&
    event.pointerId!==languageDragState.pointerId
  ){
    return;
  }

  const didMove=languageDragState.moved;
  languageDragState=null;
  languagePanel.classList.remove("dragging");

  if(didMove){
    suppressLanguageClick=true;
    saveCfg("SAVED");

    setTimeout(()=>{
      suppressLanguageClick=false;
    },0);
  }
}

    :`sms:+19165000214?body=${body}`;

function snapValue(value){
  return Math.round(Number(value||0)/SNAP_INTERVAL)*SNAP_INTERVAL;
}

function layoutKeyForUrl(url){
  let hash=2166136261;
  const text=String(url||"");

  for(let index=0;index<text.length;index++){
    hash^=text.charCodeAt(index);
    hash=Math.imul(hash,16777619);
  }

  return"link-"+(hash>>>0).toString(36);
}

function layoutUnits(){

function clearUnitPosition(unit){
  unit.style.left="";
  unit.style.right="";
  unit.style.top="";
  unit.style.width="";
  unit.style.height="";
}

function naturalLayoutSnapshot(){
  const wasDragEnabled=dragEnabled;

  document.body.classList.remove("custom-layout-active");
  layoutCanvas.classList.remove("custom-layout","drag-mode");
  layoutCanvas.style.minHeight="";

  const units=layoutUnits();
  units.forEach(clearUnitPosition);

  const canvasRect=layoutCanvas.getBoundingClientRect();
  const snapshot={};

  units.forEach(unit=>{
    const key=unit.dataset.layoutKey;
    if(!key)return;

    const rect=unit.getBoundingClientRect();

    snapshot[key]={
      x:Math.max(0,snapValue(rect.left-canvasRect.left)),
      y:Math.max(0,snapValue(rect.top-canvasRect.top)),
      w:Math.max(SNAP_INTERVAL,snapValue(rect.width))
    };
  });

  dragEnabled=wasDragEnabled;
  return snapshot;
}

function layoutExists(){
  return Boolean(layout&&Object.keys(layout).length);
}

function ensureLayoutPositions(){
  if(!layoutExists())return;

  const natural=naturalLayoutSnapshot();
  let changed=false;

  Object.entries(natural).forEach(([key,position])=>{
    if(!layout[key]){
      layout[key]=position;
      changed=true;
    }
  });

  applySavedLayout();

  if(changed){
    saveCfg("",false);
  }
}

function applySavedLayout(){
  if(!layoutExists()){
    document.body.classList.remove("custom-layout-active");
    layoutCanvas.classList.remove("custom-layout","drag-mode");
    layoutCanvas.style.minHeight="";
    layoutUnits().forEach(clearUnitPosition);
    return;
  }

  document.body.classList.add("custom-layout-active");
  layoutCanvas.classList.add("custom-layout");
  layoutCanvas.classList.toggle("drag-mode",dragEnabled);
  dragToggleButton.classList.toggle("active",dragEnabled);
  dragToggleButton.textContent=dragEnabled?"DONE":"DRAG";

  const canvasWidth=Math.max(1,layoutCanvas.clientWidth||window.innerWidth);
  let maxBottom=Math.max(window.innerHeight,document.documentElement.clientHeight);

  layoutUnits().forEach(unit=>{
    const key=unit.dataset.layoutKey;
    const saved=layout[key];
    if(!key||!saved)return;

    const naturalWidth=Math.max(
      SNAP_INTERVAL,
      Number(saved.w||unit.getBoundingClientRect().width||SNAP_INTERVAL)
    );
    const width=Math.min(naturalWidth,canvasWidth);
    const maxX=Math.max(0,canvasWidth-width);
    const x=Math.min(maxX,Math.max(0,snapValue(saved.x)));
    const y=Math.max(0,snapValue(saved.y));

    unit.style.right="auto";
    unit.style.left=x+"px";
    unit.style.top=y+"px";
    unit.style.width=width+"px";

    layout[key]={x,y,w:width};
    maxBottom=Math.max(maxBottom,y+unit.offsetHeight+SNAP_INTERVAL);
  });

  layoutCanvas.style.minHeight=maxBottom+"px";
}

function captureInitialLayout(){
  layout=naturalLayoutSnapshot();
  cfg.layout=layout;
  saveCfg("",false);

function startUnitDrag(event){
  if(!dragEnabled)return;

  const unit=event.target.closest("[data-layout-key]");
  if(!unit||!layoutCanvas.contains(unit))return;

  /*
    Sliders and text inputs keep their normal interaction.
    Menu buttons can be clicked normally or dragged after moving 5px.
  */
  if(unit===toolPanel&&event.target.closest("input,textarea,select")){
    return;
  }

  const pointerStartedOnButton=Boolean(
    unit===toolPanel&&event.target.closest("button")
  );

  if(!pointerStartedOnButton){
    event.preventDefault();
  }
  event.stopPropagation();

  const unitRect=unit.getBoundingClientRect();

  activeDrag={
    unit,
    key:unit.dataset.layoutKey,
    offsetX:event.clientX-unitRect.left,
    offsetY:event.clientY-unitRect.top,
    startX:event.clientX,
    startY:event.clientY,
    moved:false,
    pointerStartedOnButton
  };

  unit.classList.add("dragging");
}

function moveUnitDrag(event){
  if(!activeDrag)return;

  const distance=Math.hypot(
    event.clientX-activeDrag.startX,
    event.clientY-activeDrag.startY
  );

  if(!activeDrag.moved&&distance<5){
    return;
  }

  activeDrag.moved=true;
  event.preventDefault();

  const {unit,key,offsetX,offsetY}=activeDrag;
  const canvasRect=layoutCanvas.getBoundingClientRect();
  const canvasWidth=Math.max(1,layoutCanvas.clientWidth||window.innerWidth);
  const width=unit.offsetWidth;
  const maxX=Math.max(0,canvasWidth-width);

  const x=Math.min(
    maxX,
    Math.max(0,snapValue(event.clientX-canvasRect.left-offsetX))
  );
  const y=Math.max(
    0,
    snapValue(event.clientY-canvasRect.top-offsetY)
  );

  unit.style.left=x+"px";
  unit.style.top=y+"px";

  layout[key]={
    x,
    y,
    w:width
  };

  const neededHeight=y+unit.offsetHeight+SNAP_INTERVAL;
  const currentHeight=parseFloat(layoutCanvas.style.minHeight)||0;

  if(neededHeight>currentHeight){
    layoutCanvas.style.minHeight=neededHeight+"px";
  }
}

function finishUnitDrag(){
  if(!activeDrag)return;

  const didMove=activeDrag.moved;
  activeDrag.unit.classList.remove("dragging");
  activeDrag=null;

  if(didMove){
    suppressNextClick=true;
    cfg.layout=layout;
    saveCfg("SAVED");

    setTimeout(()=>{
      suppressNextClick=false;
    },0);
  }
}

function normalizeUrl(value){
  const trimmed=String(value||"").trim();
  if(!trimmed)return "";

  try{
    return new URL(trimmed).href;
  }catch(_){}

  try{
    return new URL("https://"+trimmed).href;
  }catch(_){
    return "";
  }
}

function removeLinkByUrl(url){
  const normalized=String(url||"");
  if(!normalized)return;

  const customIndex=customLinks.findIndex(
    item=>String(item&&item.url||"")===normalized
  );

  if(customIndex>=0){
    customLinks.splice(customIndex,1);
  }else if(!hiddenLinks.includes(normalized)){
    hiddenLinks.push(normalized);
  }

  delete localRenames[normalized];
  delete remoteRenames[normalized];
  delete layout[layoutKeyForUrl(normalized)];

  cfg.links=customLinks;
  cfg.hiddenLinks=[...new Set(hiddenLinks)];
  cfg.renames={...localRenames};
  cfg.layout=layout;
  cfg.menuWidth=menuWidth;
  cfg.devCode=devCode;

  saveCfg("REMOVED");
  render();
  showEditLinkChoices();
}

function applyEditedLink(oldUrl,titleValue,urlValue,showErrors=false){
  oldUrl=String(oldUrl||"");
  const title=String(titleValue||"").trim().toUpperCase();
  const newUrl=normalizeUrl(urlValue);

  if(!title){
    if(showErrors)showToast("NAME REQUIRED");
    return{ok:false,reason:"name"};
  }
  if(!newUrl){
    if(showErrors)showToast("VALID URL REQUIRED");
    return{ok:false,reason:"url"};
  }

  const duplicate=[...defaultLinks,...customLinks].some(item=>
    String(item&&item.url||"")===newUrl&&String(item&&item.url||"")!==oldUrl
  );
  if(duplicate){
    if(showErrors)showToast("URL ALREADY EXISTS");
    return{ok:false,reason:"duplicate"};
  }

  const currentItem=links().find(item=>String(item.url)===oldUrl);
  const currentTitle=String(currentItem&&currentItem.title||"").trim().toUpperCase();
  if(newUrl===oldUrl&&title===currentTitle){
    return{ok:true,url:oldUrl,changed:false};
  }

  const customIndex=customLinks.findIndex(
    item=>String(item&&item.url||"")===oldUrl
  );
  const originalDefault=defaultLinks.find(
    item=>String(item&&item.url||"")===oldUrl
  );

  delete localRenames[oldUrl];
  delete remoteRenames[oldUrl];
  hiddenLinks=hiddenLinks.filter(url=>String(url)!==newUrl);

  if(customIndex>=0){
    const updated={...customLinks[customIndex],title,url:newUrl};
    delete updated.i18nKey;
    customLinks[customIndex]=updated;
    localRenames[newUrl]=title;
  }else if(originalDefault&&newUrl===oldUrl){
    localRenames[oldUrl]=title;
  }else{
    if(!hiddenLinks.includes(oldUrl))hiddenLinks.push(oldUrl);
    customLinks.push({
      title,
      url:newUrl,
      type:originalDefault&&originalDefault.type?originalDefault.type:"WEB",
      group:originalDefault&&originalDefault.group?originalDefault.group:"Custom"
    });
    localRenames[newUrl]=title;
  }

  if(newUrl!==oldUrl){
    const oldKey=layoutKeyForUrl(oldUrl);
    const newKey=layoutKeyForUrl(newUrl);
    if(layout[oldKey]&&!layout[newKey])layout[newKey]=layout[oldKey];
    delete layout[oldKey];
  }

  return{ok:true,url:newUrl,changed:true};
}

function saveAllEditedLinks(showErrors=false){
  clearTimeout(editAutoSaveTimer);
  editAutoSaveTimer=0;

  const rows=editLinkRows();
  let changed=false;
  let firstInvalid=null;

  for(const row of rows){
    const nameInput=row.querySelector(".edit-link-name-input");
    const urlInput=row.querySelector(".edit-link-url-input");
    const oldUrl=String(row.dataset.currentUrl||"");
    if(!nameInput||!urlInput||!oldUrl)continue;

    const result=applyEditedLink(
      oldUrl,
      nameInput.value,
      urlInput.value,
      showErrors&&!firstInvalid
    );

    if(!result.ok){
      if(!firstInvalid){
        firstInvalid=result.reason==="name"?nameInput:urlInput;
      }
      continue;
    }

    row.dataset.currentUrl=result.url;
    changed=changed||result.changed;
  }

  if(changed){
    cfg.links=customLinks;
    cfg.hiddenLinks=[...new Set(hiddenLinks)];
    cfg.renames={...localRenames};
    cfg.layout=layout;
    saveCfg("",false);
    render();
  }

  if(firstInvalid&&showErrors){
    firstInvalid.focus();
  }
  return!firstInvalid;
}

function links(){
  const renames=renameMap();
  const hidden=new Set(hiddenLinks.map(String));

  return [...defaultLinks,...customLinks]
    .filter(item=>!hidden.has(String(item.url)))
    .map(item=>{
      const renamed=renames[item.url];
      const baseTitle=renamed
        ?String(renamed)
        :item.i18nKey
          ?translatedDefaultTitle(item)
          :String(item.title||"");

      return{
        ...item,
        title:baseTitle.toLocaleUpperCase(language),
        direction:item.i18nKey&&RTL_LANGUAGES.has(language)?"rtl":"ltr"
      };
    });
}

function card(item){
  const article=document.createElement("article");
  article.className="card";
  article.dataset.layoutKey=layoutKeyForUrl(item.url);
  article.dataset.search=`${item.title||""} ${item.url||""} ${item.group||""} ${item.type||""}`.toLowerCase();

  const footer=document.createElement("footer");

  const open=document.createElement("a");

  open.textContent=item.title;
  open.dir=item.direction||"ltr";
  open.style.textAlign="center";
  open.style.justifyContent="center";

  footer.append(open);
  article.append(footer);
  return article;
}

async function loadRemote(){
  if(!["http:","https:"].includes(location.protocol))return;
  try{
    const response=await fetch(REMOTE_FILE+"?t="+Date.now(),{cache:"no-store"});
    if(!response.ok)return;
    const data=await response.json();
    if(!data||!Array.isArray(data.links))return;

    const remoteUpdatedAt=Number(data.updatedAt||0);
    if(remoteUpdatedAt&&remoteUpdatedAt<Number(cfg.updatedAt||0)){
      return;
    }

    customLinks=data.links.filter(
      x=>x&&typeof x.title==="string"&&typeof x.url==="string"
    );

    hiddenLinks=Array.isArray(data.hiddenLinks)
      ?[...new Set(data.hiddenLinks.map(String))]
      :[];

    remoteRenames=
      data.renames&&typeof data.renames==="object"&&!Array.isArray(data.renames)
        ?data.renames
        :{};

    if(data.layout&&typeof data.layout==="object"&&!Array.isArray(data.layout)){
      layout=data.layout;
    }

    if(/^\d{4}$/.test(String(data.devCode||""))){
      devCode=String(data.devCode);
    }

    cfg.links=customLinks;
    cfg.hiddenLinks=[...new Set(hiddenLinks)];
    cfg.renames=renameMap();
    cfg.layout=layout;
    cfg.devCode=devCode;
    cfg.updatedAt=Math.max(remoteUpdatedAt,Date.now());

    if(Number.isFinite(Number(data.fontSize))){
      cfg.fontSize=Math.min(32,Math.max(8,Number(data.fontSize)));
      applyFontSize(cfg.fontSize,false);
    }

    if(Number.isFinite(Number(data.menuWidth))){
      cfg.menuWidth=Math.min(
        520,
        Math.max(180,Math.round(Number(data.menuWidth)/10)*10)
      );
      applyMenuSize(cfg.menuWidth,false);
    }

    if(Number.isFinite(Number(data.languageX))){
      languageX=Math.min(100,Math.max(0,Number(data.languageX)));
      cfg.languageX=languageX;
    }

    if(Number.isFinite(Number(data.languageY))){
      languageY=Math.min(100,Math.max(0,Number(data.languageY)));
      cfg.languageY=languageY;
    }

    if(Number.isFinite(Number(data.languageControlSize))){
      languageControlSize=Math.min(
        180,
        Math.max(
          60,
          Math.round(Number(data.languageControlSize)/5)*5
        )
      );
      cfg.languageControlSize=languageControlSize;
    }

    applyLanguageControlLayout(
      languageX,
      languageY,
      languageControlSize,
      false
    );

    if(Number.isFinite(Number(data.paintButtonX)))paintButtonX=Math.min(100,Math.max(0,Number(data.paintButtonX)));
    if(Number.isFinite(Number(data.paintButtonY)))paintButtonY=Math.min(100,Math.max(0,Number(data.paintButtonY)));
    if(Number.isFinite(Number(data.paintButtonSize)))paintButtonSize=Math.min(200,Math.max(60,Math.round(Number(data.paintButtonSize)/5)*5));
    if(Number.isFinite(Number(data.paintToolFontSize)))paintToolFontSize=Math.min(48,Math.max(3,Number(data.paintToolFontSize)));

    if(Array.isArray(data.enabledLanguages)){
      enabledLanguages=[...new Set([
        ...BASE_LANGUAGES,
        ...data.enabledLanguages
          .map(String)
          .filter(code=>SUPPORTED_LANGUAGES.includes(code))
      ])];
      cfg.enabledLanguages=[...enabledLanguages];
    }

    if(SUPPORTED_LANGUAGES.includes(String(data.language||""))){
      language=String(data.language);
      if(!enabledLanguages.includes(language)){
        enabledLanguages.push(language);
      }
      cfg.language=language;
      cfg.enabledLanguages=[...enabledLanguages];
      document.documentElement.lang=language;
      rebuildLanguageSelect();
    }

    saveCfg("",false);
    render();
  }catch(_){}
}

function keepToolPanelRightAnchored(){
  delete layout["tool-panel"];
  toolPanel.style.left="";
  toolPanel.style.right="0";
  toolPanel.style.top="0";
  toolPanel.style.width="";
}

function updateNaturalMenuSpacing(){
  if(layoutCanvas.classList.contains("custom-layout")){
    layoutCanvas.style.paddingTop="";
    return;
  }

  const height=Math.max(
    0,
    Math.ceil(toolPanel.getBoundingClientRect().height)
  );

  layoutCanvas.style.paddingTop=height+"px";
}

function applyMenuSize(value,save=true){
  const previousWidth=menuWidth;
  const width=Math.min(
    520,
    Math.max(180,Math.round(Number(value||220)/10)*10)
  );
  const scale=width/280;
  const controlHeight=Math.max(32,Math.round(48*scale));
  const dividerHeight=Math.max(2,Math.round(3*scale));
  const expandedHeight=(controlHeight*11.55)+(dividerHeight*10);

  menuWidth=width;
  cfg.menuWidth=width;
  menuSizeSlider.value=String(width);

  document.documentElement.style.setProperty("--menu-width",width+"px");
  document.documentElement.style.setProperty(
    "--menu-control-height",
    controlHeight+"px"
  );
  document.documentElement.style.setProperty(
    "--menu-divider-height",
    dividerHeight+"px"
  );
  document.documentElement.style.setProperty(
    "--menu-expanded-height",
    expandedHeight+"px"
  );

  keepToolPanelRightAnchored(previousWidth,width);

  requestAnimationFrame(updateNaturalMenuSpacing);

  if(layoutExists()){
    requestAnimationFrame(applySavedLayout);
  }

  if(save){
    saveCfg("",false);
  }
}

function applyFontSize(value,save=true){
  const size=Math.min(32,Math.max(8,Number(value||13)));
  document.documentElement.style.setProperty("--shared-font-size",size+"px");
  fontSizeSlider.value=String(size);
  cfg.fontSize=size;
  if(!fabricCanvas||!fabricCanvas.getActiveObject()){
    paintTextSizeInput.value=String(size);
  }
  requestAnimationFrame(updateNaturalMenuSpacing);

  if(save){
    saveCfg("",false);
  }
}

paintSplitDivider.addEventListener("keydown",event=>{
  const stacked=isPaintStackedLayout();
  const rightPanel=isPaintMobileLandscape();
  let direction=0;
  if(stacked){
    if(event.key==="ArrowUp")direction=-1;
    if(event.key==="ArrowDown")direction=1;
  }else if(rightPanel){
    if(event.key==="ArrowLeft")direction=1;
    if(event.key==="ArrowRight")direction=-1;
  }else{
    if(event.key==="ArrowLeft")direction=-1;
    if(event.key==="ArrowRight")direction=1;
  }
  if(!direction)return;
  event.preventDefault();
  const axis=Math.max(1,paintSplitAxisSize());
  const raw=getComputedStyle(paintWorkspace).getPropertyValue("--paint-tools-px").trim();
  const pixels=parseFloat(raw)||axis*.42;
  applyPaintSplit((pixels+(direction*PAINT_SPLIT_SNAP))/axis,true);
});

function isDeveloperInteractionTarget(target){
  if(!(target instanceof Element))return false;

  if(toolPanel.contains(target))return true;
  if(editLinkModal.classList.contains("open")&&editLinkModal.contains(target))return true;
  if(languagePanel.contains(target))return true;
  if(paintLauncher.contains(target))return true;
  if(dragEnabled&&target.closest("[data-layout-key]"))return true;

  return Boolean(
    target.closest(
      ".change-code-box,"+
      ".add-link-box,"+
      ".remove-link-box,"+
      ".edit-link-box,"+
      ".paint-box,"+
      ".language-request-box"

  );
}

document.addEventListener("keydown",event=>{
  if(!paintModal.classList.contains("open"))return;

  const modifier=event.ctrlKey||event.metaKey;
  const key=String(event.key||"").toLowerCase();

  if(modifier&&key==="z"){
    event.preventDefault();

    if(event.shiftKey){
      redoPaint();
    }else{
      undoPaint();
    }
  }else if(modifier&&key==="y"){
    event.preventDefault();
    redoPaint();
  }else if(modifier&&key==="c"){
    event.preventDefault();
    copyPaintSelection();
  }else if(modifier&&key==="v"){
    event.preventDefault();
    pastePaintSelection();
  }else if(
    (event.key==="Delete"||event.key==="Backspace")&&
    !event.target.closest("input,textarea")
  ){

    deletePaintSelection();

});
